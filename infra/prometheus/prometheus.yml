global:
  scrape_interval: 5s       # Frequência de coleta de métricas (otimizado para o teste)
  evaluation_interval: 5s

scrape_configs:
  # Coleta de métricas do serviço Go
  - job_name: 'http-server-projeto-korp'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['http-server-projeto-korp:8080']
